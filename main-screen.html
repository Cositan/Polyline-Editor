<!DOCTYPE html>
<html>
<head>
  <title>Polyline Editor</title>
  <style>
    body {
      margin:0;
      background:#1a1a2e;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .container {
      text-align:center;
    }

    h1 {
      font-size:42px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    p {
      opacity:0.7;
      margin-bottom:25px;
    }

    button {
      padding:15px 30px;
      font-size:18px;
      cursor:pointer;
      background:#0f3460;
      color:white;
      border:none;
      border-radius:8px;
      transition:0.2s;
    }

    button:hover {
      background:#e94560;
      transform:scale(1.05);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Polyline Editor</h1>
  <p>Draw and edit polylines interactively</p>

  <button onclick="start()">Start</button>
</div>

<script>
function start() {
  sessionStorage.setItem("fromMain", "true");
  window.location.href = "index.html";
}
</script>

</body>
</html>
